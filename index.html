<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ambilight Visualizer - Apple Style Playlist</title>
    <!-- Llibreria per llegir metadades d'àudio (ID3 tags) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
    <style>
        :root {
            --bg-color: #000;
            --apple-glass: rgba(255, 255, 255, 0.1);
            --apple-border: rgba(255, 255, 255, 0.15);
            --apple-active: rgba(255, 255, 255, 0.2);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'SF Pro Display', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        canvas {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            background-color: #000;
        }

        #ui-layer {
            position: relative;
            z-index: 10;
            text-align: center;
            pointer-events: none;
            transition: transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
            will-change: transform;
        }

        body.playlist-active #ui-layer {
            transform: translateY(-160px);
        }

        #clock {
            font-size: clamp(3rem, 12vw, 6rem);
            font-weight: 700;
            color: rgba(255, 255, 255, 0.95);
            letter-spacing: -2px;
            font-variant-numeric: tabular-nums;
            text-shadow: 0 0 40px rgba(0, 0, 0, 1);
            will-change: transform;
        }

        #playlist-container {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            width: 90%;
            max-width: 400px;
            background: var(--apple-glass);
            backdrop-filter: blur(35px);
            -webkit-backdrop-filter: blur(35px);
            border-radius: 30px;
            border: 1px solid var(--apple-border);
            padding: 20px;
            pointer-events: auto;
            transition: transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.4s;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
            opacity: 1;
        }

        #playlist-container.minimized {
            transform: translateX(-50%) translateY(50px);
            opacity: 0;
            pointer-events: none;
        }

        #current-track {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        #track-art {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            background: linear-gradient(45deg, #333, #555);
            background-size: cover;
            background-position: center;
            flex-shrink: 0;
            box-shadow: 0 8px 16px rgba(0,0,0,0.4);
        }

        #track-info {
            text-align: left;
            overflow: hidden;
            flex-grow: 1;
        }

        #track-name {
            color: white;
            font-weight: 600;
            font-size: 1rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 2px;
        }

        #track-artist {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.85rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        #player-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
            margin-bottom: 20px;
        }

        .control-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 10px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, transform 0.1s;
            color: white;
        }

        .control-btn:hover { background: var(--apple-active); }
        .control-btn:active { transform: scale(0.92); }
        .control-btn svg { width: 24px; height: 24px; fill: currentColor; }
        .play-pause-btn svg { width: 32px; height: 32px; }

        #queue {
            max-height: 140px;
            overflow-y: auto;
            border-top: 1px solid var(--apple-border);
            padding-top: 10px;
            mask-image: linear-gradient(to bottom, black 80%, transparent 100%);
        }

        #queue::-webkit-scrollbar { width: 3px; }
        #queue::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 10px; }

        .queue-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px;
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .queue-item:hover { background: rgba(255, 255, 255, 0.05); }
        .queue-item.active { background: rgba(255, 255, 255, 0.1); }

        .queue-art {
            width: 34px;
            height: 34px;
            border-radius: 6px;
            background: #222;
            background-size: cover;
        }

        .queue-details { display: flex; flex-direction: column; overflow: hidden; }
        .queue-name { color: #fff; font-size: 0.8rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        #upload-label {
            display: block;
            margin-top: 15px;
            text-align: center;
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.75rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: color 0.2s;
        }

        #upload-label:hover { color: white; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <div id="ui-layer">
        <div id="clock">00:00:00</div>
    </div>

    <div id="playlist-container">
        <div id="current-track">
            <div id="track-art"></div>
            <div id="track-info">
                <div id="track-name">Sense música</div>
                <div id="track-artist">Selecciona arxius</div>
            </div>
        </div>

        <div id="player-controls">
            <button class="control-btn" id="prev-btn" title="Anterior">
                <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
            </button>
            <button class="control-btn play-pause-btn" id="play-pause-btn" title="Reproduir/Pausar">
                <svg id="play-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                <svg id="pause-icon" viewBox="0 0 24 24" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            </button>
            <button class="control-btn" id="next-btn" title="Següent">
                <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
            </button>
        </div>

        <div id="queue"></div>

        <label id="upload-label">
            + Afegir Música
            <input type="file" id="audio-input" accept="audio/*" multiple>
        </label>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        const clockElement = document.getElementById('clock');
        const audioInput = document.getElementById('audio-input');
        const queueElement = document.getElementById('queue');
        const trackArt = document.getElementById('track-art');
        const trackName = document.getElementById('track-name');
        const trackArtist = document.getElementById('track-artist');
        const playlistContainer = document.getElementById('playlist-container');
        
        const playPauseBtn = document.getElementById('play-pause-btn');
        const playIcon = document.getElementById('play-icon');
        const pauseIcon = document.getElementById('pause-icon');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        
        let audioCtx, analyserL, analyserR, dataL, dataR, source;
        let audio = new Audio();
        audio.crossOrigin = "anonymous";
        
        let playlist = [];
        let currentIndex = -1;
        let hideTimeout;
        
        let smoothL = 0, smoothR = 0, smoothC = 0;
        let hue = 0;
        let w, h;

        function resize() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        function updateClock() {
            const now = new Date();
            clockElement.textContent = 
                `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')}`;
        }

        function togglePlaylist(show) {
            clearTimeout(hideTimeout);
            if (show) {
                playlistContainer.classList.remove('minimized');
                document.body.classList.add('playlist-active');
            } else {
                playlistContainer.classList.add('minimized');
                document.body.classList.remove('playlist-active');
            }
        }

        async function handleFiles(files) {
            const newFiles = Array.from(files);
            const wasEmpty = playlist.length === 0;
            
            for (const file of newFiles) {
                const metadata = await getMetadata(file);
                playlist.push({ file, metadata });
            }
            
            updateQueueUI();
            if (wasEmpty && playlist.length > 0) playTrack(0);
        }

        function getMetadata(file) {
            return new Promise((resolve) => {
                jsmediatags.read(file, {
                    onSuccess: function(tag) {
                        let art = null;
                        if (tag.tags.picture) {
                            const { data, format } = tag.tags.picture;
                            let base64String = "";
                            for (let i = 0; i < data.length; i++) {
                                base64String += String.fromCharCode(data[i]);
                            }
                            art = `data:${format};base64,${window.btoa(base64String)}`;
                        }
                        resolve({
                            title: tag.tags.title || file.name.split('.').slice(0, -1).join('.'),
                            artist: tag.tags.artist || "Artista desconegut",
                            art: art
                        });
                    },
                    onError: function() {
                        resolve({ title: file.name.split('.').slice(0, -1).join('.'), artist: "Artista desconegut", art: null });
                    }
                });
            });
        }

        function updateQueueUI() {
            queueElement.innerHTML = '';
            playlist.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = `queue-item ${index === currentIndex ? 'active' : ''}`;
                div.onclick = (e) => { e.stopPropagation(); playTrack(index); };
                
                const artDiv = document.createElement('div');
                artDiv.className = 'queue-art';
                if (item.metadata.art) artDiv.style.backgroundImage = `url(${item.metadata.art})`;
                else artDiv.style.background = 'linear-gradient(45deg, #222, #444)';
                
                const details = document.createElement('div');
                details.className = 'queue-details';
                details.innerHTML = `<span class="queue-name">${item.metadata.title}</span>`;
                
                div.appendChild(artDiv);
                div.appendChild(details);
                queueElement.appendChild(div);
            });
        }

        async function playTrack(index) {
            if (index < 0 || index >= playlist.length) return;
            
            if (audioCtx && audioCtx.state === 'suspended') await audioCtx.resume();

            currentIndex = index;
            const track = playlist[index];
            
            // UI
            trackName.textContent = track.metadata.title;
            trackArtist.textContent = track.metadata.artist;
            trackArt.style.backgroundImage = track.metadata.art ? `url(${track.metadata.art})` : 'linear-gradient(45deg, #111, #444)';
            updateQueueUI();

            // Ús de FileReader per evitar errors de "NotSupportedError" amb Blobs
            const reader = new FileReader();
            reader.onload = (e) => {
                audio.pause();
                audio.src = e.target.result;
                audio.load();
                
                // Intentar reproduir un cop carregat el DataURL
                audio.oncanplay = () => {
                    audio.oncanplay = null;
                    initAudioNodes();
                    audio.play().then(() => {
                        updatePlayIcons();
                        hideTimeout = setTimeout(() => togglePlaylist(false), 4000);
                    }).catch(console.error);
                };
            };
            reader.readAsDataURL(track.file);
        }

        function updatePlayIcons() {
            const isPaused = audio.paused;
            playIcon.style.display = isPaused ? 'block' : 'none';
            pauseIcon.style.display = isPaused ? 'none' : 'block';
        }

        function initAudioNodes() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const splitter = audioCtx.createChannelSplitter(2);
                analyserL = audioCtx.createAnalyser();
                analyserR = audioCtx.createAnalyser();
                analyserL.fftSize = 128;
                analyserR.fftSize = 128;
                
                source = audioCtx.createMediaElementSource(audio);
                source.connect(splitter);
                splitter.connect(analyserL, 0);
                splitter.connect(analyserR, 1);
                source.connect(audioCtx.destination);
                
                dataL = new Uint8Array(analyserL.frequencyBinCount);
                dataR = new Uint8Array(analyserR.frequencyBinCount);
                render();
            }
        }

        playPauseBtn.onclick = async (e) => {
            e.stopPropagation();
            if (!audio.src) return;
            if (audioCtx && audioCtx.state === 'suspended') await audioCtx.resume();

            if (audio.paused) audio.play().then(updatePlayIcons);
            else { audio.pause(); updatePlayIcons(); }
        };

        prevBtn.onclick = (e) => {
            e.stopPropagation();
            if (audio.currentTime > 3) audio.currentTime = 0;
            else if (currentIndex > 0) playTrack(currentIndex - 1);
        };

        nextBtn.onclick = (e) => {
            e.stopPropagation();
            if (currentIndex < playlist.length - 1) playTrack(currentIndex + 1);
        };

        audio.onended = () => {
            if (currentIndex < playlist.length - 1) playTrack(currentIndex + 1);
            else updatePlayIcons();
        };

        function render() {
            requestAnimationFrame(render);
            if (analyserL && analyserR) {
                analyserL.getByteFrequencyData(dataL);
                analyserR.getByteFrequencyData(dataR);
                let bassL = (dataL[0] + dataL[1] + dataL[2]) / 765;
                let bassR = (dataR[0] + dataR[1] + dataR[2]) / 765;
                smoothL += (bassL - smoothL) * 0.15;
                smoothR += (bassR - smoothR) * 0.15;
                smoothC = (smoothL + smoothR) * 0.5;
                hue = (hue + 0.15 + (smoothC * 0.6)) % 360; 
            }
            updateClock();
            
            ctx.globalCompositeOperation = 'source-over';
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, w, h);
            
            ctx.globalCompositeOperation = 'lighter';
            const baseFade = Math.min(w, h) * 0.12;
            
            const drawGlow = (x, y, width, height, hueVal, smoothVal) => {
                const grad = ctx.createLinearGradient(x, y, x + (width === w ? 0 : width), y + (height === h ? 0 : height));
                grad.addColorStop(0, `hsla(${hueVal}, 100%, 45%, ${0.1 + smoothVal * 0.6})`);
                grad.addColorStop(1, 'transparent');
                ctx.fillStyle = grad;
                ctx.fillRect(x, y, width, height);
            };

            const sL = baseFade + (smoothL * baseFade * 1.8);
            drawGlow(0, 0, sL, h, hue, smoothL);

            const sR = baseFade + (smoothR * baseFade * 1.8);
            drawGlow(w - sR, 0, sR, h, (hue + 180) % 360, smoothR);

            const sC = baseFade + (smoothC * baseFade * 1.2);
            drawGlow(0, 0, w, sC, (hue + 90) % 360, smoothC);
            drawGlow(0, h - sC, w, sC, (hue + 270) % 360, smoothC);

            clockElement.style.transform = `scale(${1 + (smoothC * 0.08)})`;
        }

        audioInput.onchange = (e) => { if (e.target.files.length > 0) handleFiles(e.target.files); };

        window.onclick = async (e) => {
            if (audioCtx && audioCtx.state === 'suspended') await audioCtx.resume();
            if (!playlistContainer.contains(e.target)) togglePlaylist(playlistContainer.classList.contains('minimized'));
        };

        setInterval(updateClock, 1000);
        updateClock();
        togglePlaylist(true);
    </script>
</body>
</html>
