
<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ambilight Visualizer - Universal Mobile Support</title>
    <style>
        :root {
            --bg-color: #000;
            --apple-glass: rgba(255, 255, 255, 0.12);
            --apple-border: rgba(255, 255, 255, 0.18);
            --accent-color: #fff;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'SF Pro Display', 'Inter', -apple-system, sans-serif;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        canvas {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            touch-action: none;
        }

        #ui-layer {
            position: relative;
            z-index: 10;
            text-align: center;
            pointer-events: none;
            transition: all 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
            width: 100%;
        }

        /* Moviment cap amunt quan la llista està oberta */
        body.playlist-active #ui-layer {
            transform: translateY(-20vh);
        }

        #clock {
            font-size: clamp(3.5rem, 18vw, 8rem);
            font-weight: 700;
            color: white;
            letter-spacing: -3px;
            font-variant-numeric: tabular-nums;
            text-shadow: 0 0 50px rgba(0,0,0,0.8);
            transition: transform 0.1s ease-out;
        }

        #playlist-container {
            position: absolute;
            bottom: env(safe-area-inset-bottom, 20px);
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            width: 92%;
            max-width: 450px;
            background: var(--apple-glass);
            backdrop-filter: blur(45px);
            -webkit-backdrop-filter: blur(45px);
            border-radius: 35px;
            border: 1px solid var(--apple-border);
            padding: 24px;
            pointer-events: auto;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 20px 60px rgba(0,0,0,0.7);
        }

        #playlist-container.minimized {
            transform: translateX(-50%) translateY(calc(100% + 20px));
            opacity: 0;
        }

        #current-track { 
            display: flex; 
            align-items: center; 
            gap: 16px; 
            margin-bottom: 24px; 
        }

        #track-art { 
            width: 56px; 
            height: 56px; 
            border-radius: 14px; 
            background: linear-gradient(135deg, #444, #111);
            flex-shrink: 0;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }

        #track-info { text-align: left; flex-grow: 1; overflow: hidden; }
        #track-name { color: white; font-weight: 600; font-size: 1.1rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
        #track-artist { color: rgba(255,255,255,0.55); font-size: 0.85rem; letter-spacing: 0.5px; }

        #player-controls { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            gap: 35px; 
            margin-bottom: 20px; 
        }

        .control-btn { 
            background: none; 
            border: none; 
            cursor: pointer; 
            color: white; 
            padding: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: background 0.2s;
        }
        
        .control-btn:active { background: rgba(255,255,255,0.1); }
        .control-btn svg { width: 32px; height: 32px; fill: currentColor; }

        #queue { 
            max-height: 180px; 
            overflow-y: auto; 
            border-top: 1px solid var(--apple-border); 
            padding-top: 12px;
            -webkit-overflow-scrolling: touch;
        }

        .queue-item { 
            padding: 12px 16px; 
            border-radius: 14px; 
            cursor: pointer; 
            color: white; 
            font-size: 0.9rem; 
            margin-bottom: 6px;
            transition: all 0.2s;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .queue-item:active { background: rgba(255,255,255,0.1); }
        .queue-item.active { background: rgba(255,255,255,0.2); font-weight: 600; }

        #upload-label { 
            display: block; 
            text-align: center; 
            color: rgba(255,255,255,0.4); 
            font-size: 0.8rem; 
            margin-top: 15px; 
            cursor: pointer;
            padding: 10px;
        }

        input[type="file"] { display: none; }

        /* Ajust per a pantalles en horitzontal (mòbil landscape) */
        @media (max-height: 500px) {
            body.playlist-active #ui-layer { transform: translateX(-150px); }
            #clock { font-size: 4rem; }
            #playlist-container { width: 320px; right: 20px; left: auto; transform: none; bottom: 20px; }
            #playlist-container.minimized { transform: translateY(120%); }
            #queue { max-height: 100px; }
        }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>
    <div id="ui-layer"><div id="clock">00:00:00</div></div>
    <audio id="main-audio" crossOrigin="anonymous" playsinline></audio>

    <div id="playlist-container">
        <div id="current-track">
            <div id="track-art"></div>
            <div id="track-info">
                <div id="track-name">Sense música</div>
                <div id="track-artist">Toca per obrir/tancar</div>
            </div>
        </div>
        <div id="player-controls">
            <button class="control-btn" onclick="prevTrack()" aria-label="Anterior"><svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg></button>
            <button class="control-btn" onclick="togglePlay()" aria-label="Reproduir o Pausa">
                <svg id="play-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                <svg id="pause-icon" viewBox="0 0 24 24" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            </button>
            <button class="control-btn" onclick="nextTrack()" aria-label="Següent"><svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></button>
        </div>
        <div id="queue"></div>
        <label id="upload-label">
            + AFEGIR FITXERS MP3
            <input type="file" id="audio-input" accept="audio/*" multiple>
        </label>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        const clockElement = document.getElementById('clock');
        const mainAudio = document.getElementById('main-audio');
        const audioInput = document.getElementById('audio-input');
        const playlistContainer = document.getElementById('playlist-container');
        
        let audioCtx, analyserL, analyserR, dataL, dataR, sourceNode;
        let playlist = [], currentIndex = -1, hue = 0;
        let smoothL = 0, smoothR = 0, smoothC = 0;

        function resize() {
            const dpr = window.devicePixelRatio || 1;
            canvas.width = window.innerWidth * dpr;
            canvas.height = window.innerHeight * dpr;
            ctx.scale(dpr, dpr);
        }
        window.addEventListener('resize', resize);
        resize();

        function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyserL = audioCtx.createAnalyser();
            analyserR = audioCtx.createAnalyser();
            analyserL.fftSize = 256;
            analyserR.fftSize = 256;
            dataL = new Uint8Array(analyserL.frequencyBinCount);
            dataR = new Uint8Array(analyserR.frequencyBinCount);

            sourceNode = audioCtx.createMediaElementSource(mainAudio);
            const splitter = audioCtx.createChannelSplitter(2);
            sourceNode.connect(splitter);
            splitter.connect(analyserL, 0);
            splitter.connect(analyserR, 1);
            sourceNode.connect(audioCtx.destination);
            render();
        }

        audioInput.onchange = (e) => {
            const files = Array.from(e.target.files);
            if (files.length === 0) return;
            const wasEmpty = playlist.length === 0;
            files.forEach(file => {
                // MODE ROBUST: Blob forçant MIME type per a MP3s de tercers
                const universalBlob = new Blob([file], { type: 'audio/mpeg' });
                playlist.push({
                    title: file.name.replace(/\.[^/.]+$/, ""),
                    url: URL.createObjectURL(universalBlob)
                });
            });
            updateQueueUI();
            if (wasEmpty) playTrack(0);
        };

        function updateQueueUI() {
            const queue = document.getElementById('queue');
            queue.innerHTML = playlist.map((item, i) => 
                `<div class="queue-item ${i === currentIndex ? 'active' : ''}" onclick="event.stopPropagation(); playTrack(${i})">${item.title}</div>`
            ).join('');
        }

        async function playTrack(index) {
            if (index < 0 || index >= playlist.length) return;
            initAudio();
            if (audioCtx.state === 'suspended') await audioCtx.resume();

            currentIndex = index;
            const track = playlist[index];
            document.getElementById('track-name').textContent = track.title;
            document.getElementById('track-artist').textContent = "Càrrega robusta...";
            updateQueueUI();

            mainAudio.src = track.url;
            mainAudio.load();
            mainAudio.play().then(() => {
                document.getElementById('track-artist').textContent = "En reproducció";
                updateIcons();
            }).catch(() => {
                document.getElementById('track-artist').textContent = "Format no suportat - Saltant...";
                setTimeout(nextTrack, 1500);
            });
        }

        function togglePlay() {
            event.stopPropagation();
            if (!mainAudio.src) return;
            mainAudio.paused ? mainAudio.play() : mainAudio.pause();
            updateIcons();
        }

        function updateIcons() {
            document.getElementById('play-icon').style.display = mainAudio.paused ? 'block' : 'none';
            document.getElementById('pause-icon').style.display = mainAudio.paused ? 'none' : 'block';
        }

        function nextTrack() { event?.stopPropagation(); if (currentIndex < playlist.length - 1) playTrack(currentIndex + 1); }
        function prevTrack() { event?.stopPropagation(); if (currentIndex > 0) playTrack(currentIndex - 1); }

        mainAudio.onended = nextTrack;

        function render() {
            requestAnimationFrame(render);
            const w = window.innerWidth;
            const h = window.innerHeight;

            if (!mainAudio.paused) {
                analyserL.getByteFrequencyData(dataL);
                analyserR.getByteFrequencyData(dataR);
                let bL = (dataL[1] + dataL[2] + dataL[3]) / 765;
                let bR = (dataR[1] + dataR[2] + dataR[3]) / 765;
                smoothL += (bL - smoothL) * 0.15;
                smoothR += (bR - smoothR) * 0.15;
                smoothC = (smoothL + smoothR) * 0.5;
                hue = (hue + 0.3 + (smoothC * 1.8)) % 360;
            } else {
                smoothL *= 0.9; smoothR *= 0.9; smoothC *= 0.9;
            }

            const now = new Date();
            clockElement.textContent = now.getHours().toString().padStart(2,'0') + ":" + 
                                     now.getMinutes().toString().padStart(2,'0') + ":" + 
                                     now.getSeconds().toString().padStart(2,'0');
            clockElement.style.transform = `scale(${1 + (smoothC * 0.15)})`;

            ctx.globalCompositeOperation = 'source-over';
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, w, h);

            // AMBILIGHT RENDER (Optimitzat per a mòbil)
            ctx.globalCompositeOperation = 'screen';
            const intensity = 0.3 + smoothC * 0.7;
            const range = Math.min(w, h) * 0.45;

            // Esquerra
            const gL = ctx.createLinearGradient(0, 0, range * (1 + smoothL * 1.5), 0);
            gL.addColorStop(0, `hsla(${hue}, 100%, 50%, ${intensity})`);
            gL.addColorStop(1, 'transparent');
            ctx.fillStyle = gL; ctx.fillRect(0, 0, w/2, h);

            // Dreta
            const gR = ctx.createLinearGradient(w, 0, w - range * (1 + smoothR * 1.5), 0);
            gR.addColorStop(0, `hsla(${(hue + 60) % 360}, 100%, 50%, ${intensity})`);
            gR.addColorStop(1, 'transparent');
            ctx.fillStyle = gR; ctx.fillRect(w/2, 0, w/2, h);

            // Superior/Inferior (Halo)
            const pulse = range * (0.8 + smoothC * 1.2);
            const gC = ctx.createRadialGradient(w/2, h/2, 0, w/2, h/2, pulse);
            gC.addColorStop(0, 'transparent');
            gC.addColorStop(1, `hsla(${(hue + 140) % 360}, 100%, 55%, ${smoothC * 0.25})`);
            ctx.fillStyle = gC; ctx.fillRect(0, 0, w, h);
        }

        // Gestió de visibilitat de la UI
        window.addEventListener('touchstart', (e) => {
            if (!playlistContainer.contains(e.target)) {
                const isMinimized = playlistContainer.classList.toggle('minimized');
                document.body.classList.toggle('playlist-active', !isMinimized);
            }
        });

        // Fallback per a PC
        window.onclick = (e) => {
            if (e.pointerType === 'mouse' && !playlistContainer.contains(e.target)) {
                const isMinimized = playlistContainer.classList.toggle('minimized');
                document.body.classList.toggle('playlist-active', !isMinimized);
            }
        };
    </script>
</body>
</html>
