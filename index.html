<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ambilight Visualizer - Pro Sound Engine</title>
    <style>
        :root {
            --bg-color: #000;
            --apple-glass: rgba(255, 255, 255, 0.1);
            --apple-border: rgba(255, 255, 255, 0.15);
            --apple-active: rgba(255, 255, 255, 0.2);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'SF Pro Display', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            user-select: none;
        }

        canvas {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            background-color: #000;
        }

        #ui-layer {
            position: relative;
            z-index: 10;
            text-align: center;
            pointer-events: none;
            transition: transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        body.playlist-active #ui-layer {
            transform: translateY(-160px);
        }

        #clock {
            font-size: clamp(3rem, 12vw, 6rem);
            font-weight: 700;
            color: rgba(255, 255, 255, 0.95);
            letter-spacing: -2px;
            font-variant-numeric: tabular-nums;
            text-shadow: 0 0 40px rgba(0, 0, 0, 1);
        }

        #playlist-container {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            width: 90%;
            max-width: 400px;
            background: var(--apple-glass);
            backdrop-filter: blur(35px);
            -webkit-backdrop-filter: blur(35px);
            border-radius: 30px;
            border: 1px solid var(--apple-border);
            padding: 20px;
            pointer-events: auto;
            transition: all 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
        }

        #playlist-container.minimized {
            transform: translateX(-50%) translateY(50px);
            opacity: 0;
            pointer-events: none;
        }

        #current-track {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        #track-art {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            background: linear-gradient(45deg, #333, #555);
            box-shadow: 0 8px 16px rgba(0,0,0,0.4);
        }

        #track-info { text-align: left; overflow: hidden; flex-grow: 1; }
        #track-name { color: white; font-weight: 600; font-size: 1rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        #track-artist { color: rgba(255, 255, 255, 0.5); font-size: 0.85rem; }

        #player-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
            margin-bottom: 20px;
        }

        .control-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 10px;
            color: white;
            transition: transform 0.1s;
        }

        .control-btn:active { transform: scale(0.92); }
        .control-btn svg { width: 24px; height: 24px; fill: currentColor; }

        #queue {
            max-height: 140px;
            overflow-y: auto;
            border-top: 1px solid var(--apple-border);
            padding-top: 10px;
        }

        .queue-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px;
            border-radius: 12px;
            cursor: pointer;
        }

        .queue-item.active { background: rgba(255, 255, 255, 0.1); }
        .queue-name { color: #fff; font-size: 0.8rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        #upload-label {
            display: block;
            margin-top: 15px;
            text-align: center;
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.75rem;
            cursor: pointer;
        }

        input[type="file"] { display: none; }
        
        #audio-element-container { display: none; }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <div id="ui-layer">
        <div id="clock">00:00:00</div>
    </div>

    <div id="audio-element-container">
        <audio id="main-audio" crossOrigin="anonymous"></audio>
    </div>

    <div id="playlist-container">
        <div id="current-track">
            <div id="track-art"></div>
            <div id="track-info">
                <div id="track-name">Sense música</div>
                <div id="track-artist">Carrega els teus MP3</div>
            </div>
        </div>

        <div id="player-controls">
            <button class="control-btn" id="prev-btn"><svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg></button>
            <button class="control-btn" id="play-pause-btn">
                <svg id="play-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                <svg id="pause-icon" viewBox="0 0 24 24" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            </button>
            <button class="control-btn" id="next-btn"><svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></button>
        </div>

        <div id="queue"></div>

        <label id="upload-label">
            + Afegir Música (Llista de reproducció)
            <input type="file" id="audio-input" accept="audio/*" multiple>
        </label>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        const clockElement = document.getElementById('clock');
        const audioInput = document.getElementById('audio-input');
        const queueElement = document.getElementById('queue');
        const trackName = document.getElementById('track-name');
        const trackArtist = document.getElementById('track-artist');
        const playlistContainer = document.getElementById('playlist-container');
        const playPauseBtn = document.getElementById('play-pause-btn');
        const playIcon = document.getElementById('play-icon');
        const pauseIcon = document.getElementById('pause-icon');
        const mainAudio = document.getElementById('main-audio');
        
        let audioCtx, analyserL, analyserR, dataL, dataR;
        let sourceNode = null; 
        let playlist = [];
        let currentIndex = -1;
        
        let smoothL = 0, smoothR = 0, smoothC = 0, hue = 0;
        let w, h;

        function resize() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        function updateClock() {
            const now = new Date();
            clockElement.textContent = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')}`;
        }

        function initAudioContext() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyserL = audioCtx.createAnalyser();
            analyserR = audioCtx.createAnalyser();
            analyserL.fftSize = 256; // Més resolució per a les vores
            analyserR.fftSize = 256;
            dataL = new Uint8Array(analyserL.frequencyBinCount);
            dataR = new Uint8Array(analyserR.frequencyBinCount);

            sourceNode = audioCtx.createMediaElementSource(mainAudio);
            const splitter = audioCtx.createChannelSplitter(2);
            sourceNode.connect(splitter);
            splitter.connect(analyserL, 0);
            splitter.connect(analyserR, 1);
            sourceNode.connect(audioCtx.destination);
            
            render();
        }

        audioInput.onchange = (e) => {
            const files = Array.from(e.target.files);
            if (files.length === 0) return;
            const wasEmpty = playlist.length === 0;
            files.forEach(file => {
                playlist.push({ 
                    file, 
                    title: file.name.replace(/\.[^/.]+$/, ""),
                    url: URL.createObjectURL(file) 
                });
            });
            updateQueueUI();
            if (wasEmpty) playTrack(0);
        };

        function updateQueueUI() {
            queueElement.innerHTML = '';
            playlist.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = `queue-item ${index === currentIndex ? 'active' : ''}`;
                div.onclick = (e) => { e.stopPropagation(); playTrack(index); };
                div.innerHTML = `<div class="queue-name">${item.title}</div>`;
                queueElement.appendChild(div);
            });
        }

        async function playTrack(index) {
            if (index < 0 || index >= playlist.length) return;
            
            initAudioContext();
            if (audioCtx.state === 'suspended') await audioCtx.resume();

            currentIndex = index;
            const track = playlist[index];
            trackName.textContent = track.title;
            trackArtist.textContent = "Preparant...";
            updateQueueUI();

            mainAudio.src = track.url;
            mainAudio.load();
            
            mainAudio.play().then(() => {
                trackArtist.textContent = "Reproduint";
                updateButtons();
            }).catch(err => {
                console.error("Error:", err);
                trackArtist.textContent = "Error de format";
            });
        }

        mainAudio.onended = () => {
            if (currentIndex < playlist.length - 1) playTrack(currentIndex + 1);
        };

        function updateButtons() {
            const isPlaying = !mainAudio.paused;
            playIcon.style.display = isPlaying ? 'none' : 'block';
            pauseIcon.style.display = isPlaying ? 'block' : 'none';
        }

        playPauseBtn.onclick = (e) => {
            e.stopPropagation();
            if (!mainAudio.src) return;
            if (mainAudio.paused) mainAudio.play(); else mainAudio.pause();
            setTimeout(updateButtons, 50);
        };

        document.getElementById('next-btn').onclick = () => {
            if (currentIndex < playlist.length - 1) playTrack(currentIndex + 1);
        };

        document.getElementById('prev-btn').onclick = () => {
            if (currentIndex > 0) playTrack(currentIndex - 1);
        };

        function render() {
            requestAnimationFrame(render);
            const isPlaying = !mainAudio.paused;
            
            if (analyserL && isPlaying) {
                analyserL.getByteFrequencyData(dataL);
                analyserR.getByteFrequencyData(dataR);
                
                // Càlcul de brillantor basat en baixos i mitjos
                let bL = (dataL[1] + dataL[2] + dataL[3]) / 765;
                let bR = (dataR[1] + dataR[2] + dataR[3]) / 765;
                
                smoothL += (bL - smoothL) * 0.15;
                smoothR += (bR - smoothR) * 0.15;
                smoothC = (smoothL + smoothR) * 0.5;
                
                // Canvi de color suau
                hue = (hue + 0.3 + (smoothC * 1.5)) % 360;
            } else {
                smoothL *= 0.95; smoothR *= 0.95; smoothC *= 0.95;
            }

            updateClock();
            
            // Fons negre pur
            ctx.globalCompositeOperation = 'source-over';
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, w, h);
            
            // Efecte Ambilight vibrant
            ctx.globalCompositeOperation = 'screen';
            
            // Mida dinàmica de l'halo
            const edgeSize = Math.min(w, h) * 0.35; 
            const pulse = edgeSize * smoothC;

            // Gradient ESQUERRA
            const gradL = ctx.createLinearGradient(0, 0, edgeSize + pulse, 0);
            gradL.addColorStop(0, `hsla(${hue}, 100%, 50%, ${0.1 + smoothL * 0.8})`);
            gradL.addColorStop(1, 'transparent');
            ctx.fillStyle = gradL;
            ctx.fillRect(0, 0, edgeSize + pulse, h);

            // Gradient DRETA
            const gradR = ctx.createLinearGradient(w, 0, w - (edgeSize + pulse), 0);
            gradR.addColorStop(0, `hsla(${(hue + 60) % 360}, 100%, 50%, ${0.1 + smoothR * 0.8})`);
            gradR.addColorStop(1, 'transparent');
            ctx.fillStyle = gradR;
            ctx.fillRect(w - (edgeSize + pulse), 0, edgeSize + pulse, h);

            // Gradient SUPERIOR
            const gradT = ctx.createLinearGradient(0, 0, 0, edgeSize * 0.7 + pulse);
            gradT.addColorStop(0, `hsla(${(hue + 30) % 360}, 100%, 50%, ${0.1 + smoothC * 0.7})`);
            gradT.addColorStop(1, 'transparent');
            ctx.fillStyle = gradT;
            ctx.fillRect(0, 0, w, edgeSize * 0.7 + pulse);

            // Gradient INFERIOR
            const gradB = ctx.createLinearGradient(0, h, 0, h - (edgeSize * 0.7 + pulse));
            gradB.addColorStop(0, `hsla(${(hue + 200) % 360}, 100%, 50%, ${0.1 + smoothC * 0.7})`);
            gradB.addColorStop(1, 'transparent');
            ctx.fillStyle = gradB;
            ctx.fillRect(0, h - (edgeSize * 0.7 + pulse), w, edgeSize * 0.7 + pulse);

            // Animació del rellotge
            clockElement.style.transform = `scale(${1 + (smoothC * 0.15)})`;
            clockElement.style.textShadow = `0 0 ${20 + smoothC * 60}px hsla(${hue}, 100%, 70%, 0.5)`;
        }

        window.onclick = (e) => {
            if (!playlistContainer.contains(e.target)) {
                playlistContainer.classList.toggle('minimized');
                document.body.classList.toggle('playlist-active');
            }
        };

        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
