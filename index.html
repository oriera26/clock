<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ambilight Visualizer - Pro Sound Engine</title>
    <style>
        :root {
            --bg-color: #000;
            --apple-glass: rgba(255, 255, 255, 0.1);
            --apple-border: rgba(255, 255, 255, 0.15);
            --apple-active: rgba(255, 255, 255, 0.2);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'SF Pro Display', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            user-select: none;
        }

        canvas {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            background-color: #000;
        }

        #ui-layer {
            position: relative;
            z-index: 10;
            text-align: center;
            pointer-events: none;
            transition: transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        body.playlist-active #ui-layer {
            transform: translateY(-160px);
        }

        #clock {
            font-size: clamp(3rem, 12vw, 6rem);
            font-weight: 700;
            color: rgba(255, 255, 255, 0.95);
            letter-spacing: -2px;
            font-variant-numeric: tabular-nums;
            text-shadow: 0 0 40px rgba(0, 0, 0, 1);
        }

        #playlist-container {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            width: 90%;
            max-width: 400px;
            background: var(--apple-glass);
            backdrop-filter: blur(35px);
            -webkit-backdrop-filter: blur(35px);
            border-radius: 30px;
            border: 1px solid var(--apple-border);
            padding: 20px;
            pointer-events: auto;
            transition: all 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
        }

        #playlist-container.minimized {
            transform: translateX(-50%) translateY(50px);
            opacity: 0;
            pointer-events: none;
        }

        #current-track {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        #track-art {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            background: linear-gradient(45deg, #333, #555);
            box-shadow: 0 8px 16px rgba(0,0,0,0.4);
        }

        #track-info { text-align: left; overflow: hidden; flex-grow: 1; }
        #track-name { color: white; font-weight: 600; font-size: 1rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        #track-artist { color: rgba(255, 255, 255, 0.5); font-size: 0.85rem; }

        #player-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
            margin-bottom: 20px;
        }

        .control-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 10px;
            color: white;
            transition: transform 0.1s;
        }

        .control-btn:active { transform: scale(0.92); }
        .control-btn svg { width: 24px; height: 24px; fill: currentColor; }

        #queue {
            max-height: 140px;
            overflow-y: auto;
            border-top: 1px solid var(--apple-border);
            padding-top: 10px;
        }

        .queue-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px;
            border-radius: 12px;
            cursor: pointer;
        }

        .queue-item.active { background: rgba(255, 255, 255, 0.1); }
        .queue-name { color: #fff; font-size: 0.8rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        #upload-label {
            display: block;
            margin-top: 15px;
            text-align: center;
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.75rem;
            cursor: pointer;
        }

        input[type="file"] { display: none; }
        
        #hidden-audio-container { display: none; }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <div id="ui-layer">
        <div id="clock">00:00:00</div>
    </div>

    <div id="hidden-audio-container"></div>

    <div id="playlist-container">
        <div id="current-track">
            <div id="track-art"></div>
            <div id="track-info">
                <div id="track-name">Sense música</div>
                <div id="track-artist">Carrega els teus MP3</div>
            </div>
        </div>

        <div id="player-controls">
            <button class="control-btn" id="prev-btn"><svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg></button>
            <button class="control-btn" id="play-pause-btn">
                <svg id="play-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                <svg id="pause-icon" viewBox="0 0 24 24" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            </button>
            <button class="control-btn" id="next-btn"><svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></button>
        </div>

        <div id="queue"></div>

        <label id="upload-label">
            + Afegir Música (Universal MP3)
            <input type="file" id="audio-input" accept="audio/*" multiple>
        </label>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        const clockElement = document.getElementById('clock');
        const audioInput = document.getElementById('audio-input');
        const queueElement = document.getElementById('queue');
        const trackName = document.getElementById('track-name');
        const trackArtist = document.getElementById('track-artist');
        const playlistContainer = document.getElementById('playlist-container');
        const playPauseBtn = document.getElementById('play-pause-btn');
        const playIcon = document.getElementById('play-icon');
        const pauseIcon = document.getElementById('pause-icon');
        const audioContainer = document.getElementById('hidden-audio-container');
        
        let audioCtx, analyserL, analyserR, dataL, dataR;
        let audioEl = null;
        let sourceNode = null; 
        let playlist = [];
        let currentIndex = -1;
        
        let smoothL = 0, smoothR = 0, smoothC = 0, hue = 0;
        let w, h;

        function resize() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        function updateClock() {
            const now = new Date();
            clockElement.textContent = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')}`;
        }

        function initAudioContext() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyserL = audioCtx.createAnalyser();
            analyserR = audioCtx.createAnalyser();
            analyserL.fftSize = 128;
            analyserR.fftSize = 128;
            dataL = new Uint8Array(analyserL.frequencyBinCount);
            dataR = new Uint8Array(analyserR.frequencyBinCount);
            render();
        }

        audioInput.onchange = (e) => {
            const files = Array.from(e.target.files);
            if (files.length === 0) return;
            const wasEmpty = playlist.length === 0;
            files.forEach(file => {
                playlist.push({ 
                    file, 
                    title: file.name.replace(/\.[^/.]+$/, ""),
                    url: URL.createObjectURL(file) 
                });
            });
            updateQueueUI();
            if (wasEmpty) playTrack(0);
        };

        function updateQueueUI() {
            queueElement.innerHTML = '';
            playlist.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = `queue-item ${index === currentIndex ? 'active' : ''}`;
                div.onclick = (e) => { e.stopPropagation(); playTrack(index); };
                div.innerHTML = `<div class="queue-name">${item.title}</div>`;
                queueElement.appendChild(div);
            });
        }

        async function playTrack(index) {
            if (index < 0 || index >= playlist.length) return;
            
            initAudioContext();
            if (audioCtx.state === 'suspended') await audioCtx.resume();

            // Neteja total de l'element anterior per evitar 404 i errors de memòria
            if (audioEl) {
                audioEl.pause();
                audioEl.src = "";
                audioEl.load();
                audioEl.remove();
            }

            currentIndex = index;
            const track = playlist[index];
            trackName.textContent = track.title;
            trackArtist.textContent = "Preparant reproductor...";
            updateQueueUI();

            // Creem un element d'àudio nou: l'estratègia més compatible del món
            audioEl = document.createElement('audio');
            audioEl.crossOrigin = "anonymous";
            audioEl.src = track.url;
            audioContainer.appendChild(audioEl);

            audioEl.oncanplay = () => {
                if (sourceNode) sourceNode.disconnect();
                
                // Connectem el motor de visualització a l'element d'àudio
                sourceNode = audioCtx.createMediaElementSource(audioEl);
                const splitter = audioCtx.createChannelSplitter(2);
                sourceNode.connect(splitter);
                splitter.connect(analyserL, 0);
                splitter.connect(analyserR, 1);
                sourceNode.connect(audioCtx.destination);
                
                audioEl.play().catch(console.error);
                trackArtist.textContent = "Reproduint (Mode Universal)";
                updateButtons();
            };

            audioEl.onerror = () => {
                trackArtist.textContent = "Error en llegir MP3";
                console.error("Error d'àudio HTML5");
            };

            audioEl.onended = () => {
                if (currentIndex < playlist.length - 1) playTrack(currentIndex + 1);
            };
        }

        function updateButtons() {
            const isPlaying = audioEl && !audioEl.paused;
            playIcon.style.display = isPlaying ? 'none' : 'block';
            pauseIcon.style.display = isPlaying ? 'block' : 'none';
        }

        playPauseBtn.onclick = (e) => {
            e.stopPropagation();
            if (!audioEl) return;
            if (audioEl.paused) audioEl.play(); else audioEl.pause();
            setTimeout(updateButtons, 50);
        };

        document.getElementById('next-btn').onclick = () => {
            if (currentIndex < playlist.length - 1) playTrack(currentIndex + 1);
        };

        document.getElementById('prev-btn').onclick = () => {
            if (currentIndex > 0) playTrack(currentIndex - 1);
        };

        function render() {
            requestAnimationFrame(render);
            const isPlaying = audioEl && !audioEl.paused;
            if (analyserL && isPlaying) {
                analyserL.getByteFrequencyData(dataL);
                analyserR.getByteFrequencyData(dataR);
                let bL = (dataL[0] + dataL[1] + dataL[2]) / 765;
                let bR = (dataR[0] + dataR[1] + dataR[2]) / 765;
                smoothL += (bL - smoothL) * 0.15;
                smoothR += (bR - smoothR) * 0.15;
                smoothC = (smoothL + smoothR) * 0.5;
                hue = (hue + 0.2 + (smoothC * 0.8)) % 360;
            } else {
                smoothL *= 0.9; smoothR *= 0.9; smoothC *= 0.9;
            }

            updateClock();
            ctx.globalCompositeOperation = 'source-over';
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, w, h);
            
            ctx.globalCompositeOperation = 'lighter';
            const baseFade = Math.min(w, h) * 0.15;
            const drawG = (x, y, wi, he, hV, sV) => {
                const grad = ctx.createLinearGradient(x, y, x + (wi === w ? 0 : wi), y + (he === h ? 0 : he));
                grad.addColorStop(0, `hsla(${hV}, 100%, 50%, ${0.05 + sV * 0.75})`);
                grad.addColorStop(1, 'transparent');
                ctx.fillStyle = grad;
                ctx.fillRect(x, y, wi, he);
            };

            drawG(0, 0, baseFade + (smoothL * baseFade * 2), h, hue, smoothL);
            drawG(w - (baseFade + (smoothR * baseFade * 2)), 0, baseFade + (smoothR * baseFade * 2), h, (hue + 180) % 360, smoothR);
            const vG = baseFade + (smoothC * baseFade);
            drawG(0, 0, w, vG, (hue + 90) % 360, smoothC);
            drawG(0, h - vG, w, vG, (hue + 270) % 360, smoothC);
            clockElement.style.transform = `scale(${1 + (smoothC * 0.1)})`;
        }

        window.onclick = (e) => {
            if (!playlistContainer.contains(e.target)) {
                playlistContainer.classList.toggle('minimized');
                document.body.classList.toggle('playlist-active');
            }
        };

        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
