<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ambilight Visualizer - Apple Style Playlist</title>
    <style>
        :root {
            --bg-color: #000;
            --apple-glass: rgba(255, 255, 255, 0.1);
            --apple-border: rgba(255, 255, 255, 0.15);
            --apple-active: rgba(255, 255, 255, 0.2);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'SF Pro Display', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            user-select: none;
        }

        canvas {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            background-color: #000;
        }

        #ui-layer {
            position: relative;
            z-index: 10;
            text-align: center;
            pointer-events: none;
            transition: transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
            will-change: transform;
        }

        body.playlist-active #ui-layer {
            transform: translateY(-160px);
        }

        #clock {
            font-size: clamp(3rem, 12vw, 6rem);
            font-weight: 700;
            color: rgba(255, 255, 255, 0.95);
            letter-spacing: -2px;
            font-variant-numeric: tabular-nums;
            text-shadow: 0 0 40px rgba(0, 0, 0, 1);
            will-change: transform;
        }

        #playlist-container {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            width: 90%;
            max-width: 400px;
            background: var(--apple-glass);
            backdrop-filter: blur(35px);
            -webkit-backdrop-filter: blur(35px);
            border-radius: 30px;
            border: 1px solid var(--apple-border);
            padding: 20px;
            pointer-events: auto;
            transition: transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.4s;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
            opacity: 1;
        }

        #playlist-container.minimized {
            transform: translateX(-50%) translateY(50px);
            opacity: 0;
            pointer-events: none;
        }

        #current-track {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        #track-art {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            background: linear-gradient(45deg, #333, #555);
            flex-shrink: 0;
            box-shadow: 0 8px 16px rgba(0,0,0,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #track-info {
            text-align: left;
            overflow: hidden;
            flex-grow: 1;
        }

        #track-name {
            color: white;
            font-weight: 600;
            font-size: 1rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 2px;
        }

        #track-artist {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.85rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        #player-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
            margin-bottom: 20px;
        }

        .control-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 10px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, transform 0.1s;
            color: white;
        }

        .control-btn:hover { background: var(--apple-active); }
        .control-btn:active { transform: scale(0.92); }
        .control-btn svg { width: 24px; height: 24px; fill: currentColor; }
        .play-pause-btn svg { width: 32px; height: 32px; }

        #queue {
            max-height: 140px;
            overflow-y: auto;
            border-top: 1px solid var(--apple-border);
            padding-top: 10px;
            mask-image: linear-gradient(to bottom, black 80%, transparent 100%);
        }

        #queue::-webkit-scrollbar { width: 3px; }
        #queue::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 10px; }

        .queue-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px;
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .queue-item:hover { background: rgba(255, 255, 255, 0.05); }
        .queue-item.active { background: rgba(255, 255, 255, 0.1); }

        .queue-art {
            width: 34px;
            height: 34px;
            border-radius: 6px;
            background: #222;
        }

        .queue-details { display: flex; flex-direction: column; overflow: hidden; }
        .queue-name { color: #fff; font-size: 0.8rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        #upload-label {
            display: block;
            margin-top: 15px;
            text-align: center;
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.75rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
        }

        #upload-label:hover { color: white; }
        input[type="file"] { display: none; }

        .loading-spinner {
            width: 20px; height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <div id="ui-layer">
        <div id="clock">00:00:00</div>
    </div>

    <!-- Element àudio ocult: la clau de la robustesa -->
    <audio id="audio-element" crossorigin="anonymous"></audio>

    <div id="playlist-container">
        <div id="current-track">
            <div id="track-art"></div>
            <div id="track-info">
                <div id="track-name">Sense música</div>
                <div id="track-artist">Selecciona arxius</div>
            </div>
        </div>

        <div id="player-controls">
            <button class="control-btn" id="prev-btn">
                <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
            </button>
            <button class="control-btn play-pause-btn" id="play-pause-btn">
                <svg id="play-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                <svg id="pause-icon" viewBox="0 0 24 24" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            </button>
            <button class="control-btn" id="next-btn">
                <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
            </button>
        </div>

        <div id="queue"></div>

        <label id="upload-label">
            + Afegir Música
            <input type="file" id="audio-input" accept="audio/*" multiple>
        </label>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        const clockElement = document.getElementById('clock');
        const audioInput = document.getElementById('audio-input');
        const audioEl = document.getElementById('audio-element');
        const queueElement = document.getElementById('queue');
        const trackArt = document.getElementById('track-art');
        const trackName = document.getElementById('track-name');
        const trackArtist = document.getElementById('track-artist');
        const playlistContainer = document.getElementById('playlist-container');
        const playPauseBtn = document.getElementById('play-pause-btn');
        const playIcon = document.getElementById('play-icon');
        const pauseIcon = document.getElementById('pause-icon');
        
        let audioCtx, analyserL, analyserR, dataL, dataR, sourceNode;
        let playlist = [];
        let currentIndex = -1;
        let hideTimeout;
        let smoothL = 0, smoothR = 0, smoothC = 0, hue = 0;
        let w, h;

        function resize() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        function updateClock() {
            const now = new Date();
            clockElement.textContent = 
                `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')}`;
        }

        function togglePlaylist(show) {
            clearTimeout(hideTimeout);
            if (show) {
                playlistContainer.classList.remove('minimized');
                document.body.classList.add('playlist-active');
            } else {
                playlistContainer.classList.add('minimized');
                document.body.classList.remove('playlist-active');
            }
        }

        // Inicialització del context d'àudio (NOMÉS UN COP)
        function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            // Creem els nodes
            sourceNode = audioCtx.createMediaElementSource(audioEl);
            analyserL = audioCtx.createAnalyser();
            analyserR = audioCtx.createAnalyser();
            analyserL.fftSize = 128;
            analyserR.fftSize = 128;
            
            const splitter = audioCtx.createChannelSplitter(2);
            
            // Connectem: Audio -> Splitter -> Analitzadors -> Merged -> Destination
            sourceNode.connect(splitter);
            splitter.connect(analyserL, 0);
            splitter.connect(analyserR, 1);
            sourceNode.connect(audioCtx.destination);
            
            dataL = new Uint8Array(analyserL.frequencyBinCount);
            dataR = new Uint8Array(analyserR.frequencyBinCount);
            
            render();
        }

        audioInput.onchange = (e) => {
            const files = Array.from(e.target.files);
            if (files.length === 0) return;
            
            const wasEmpty = playlist.length === 0;
            files.forEach(file => {
                if (file.type.startsWith('audio/')) {
                    playlist.push({ file, title: file.name.replace(/\.[^/.]+$/, "") });
                }
            });
            
            updateQueueUI();
            if (wasEmpty) playTrack(0);
        };

        function updateQueueUI() {
            queueElement.innerHTML = '';
            playlist.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = `queue-item ${index === currentIndex ? 'active' : ''}`;
                div.onclick = (e) => { e.stopPropagation(); playTrack(index); };
                div.innerHTML = `
                    <div class="queue-art" style="background: linear-gradient(45deg, #222, #444)"></div>
                    <div class="queue-details"><span class="queue-name">${item.title}</span></div>
                `;
                queueElement.appendChild(div);
            });
        }

        function playTrack(index) {
            if (index < 0 || index >= playlist.length) return;
            initAudio();
            
            if (audioCtx.state === 'suspended') audioCtx.resume();

            currentIndex = index;
            const track = playlist[index];
            
            // Alliberar URL anterior per evitar fuites de memòria
            if (audioEl.src) URL.revokeObjectURL(audioEl.src);
            
            // Crear URL temporal de l'arxiu
            audioEl.src = URL.createObjectURL(track.file);
            
            trackName.textContent = track.title;
            trackArtist.textContent = "Reproduint...";
            updateQueueUI();

            audioEl.play().catch(err => {
                console.error("Error en reproduir:", err);
                trackName.textContent = "Error de reproducció";
            });

            hideTimeout = setTimeout(() => togglePlaylist(false), 5000);
        }

        audioEl.onplay = () => {
            playIcon.style.display = 'none';
            pauseIcon.style.display = 'block';
        };

        audioEl.onpause = () => {
            playIcon.style.display = 'block';
            pauseIcon.style.display = 'none';
        };

        audioEl.onended = () => {
            if (currentIndex < playlist.length - 1) playTrack(currentIndex + 1);
        };

        playPauseBtn.onclick = (e) => {
            e.stopPropagation();
            if (audioEl.paused) audioEl.play();
            else audioEl.pause();
        };

        document.getElementById('prev-btn').onclick = (e) => {
            e.stopPropagation();
            if (audioEl.currentTime > 3) audioEl.currentTime = 0;
            else if (currentIndex > 0) playTrack(currentIndex - 1);
        };

        document.getElementById('next-btn').onclick = (e) => {
            e.stopPropagation();
            if (currentIndex < playlist.length - 1) playTrack(currentIndex + 1);
        };

        function render() {
            requestAnimationFrame(render);
            
            if (analyserL && !audioEl.paused) {
                analyserL.getByteFrequencyData(dataL);
                analyserR.getByteFrequencyData(dataR);
                
                let bassL = (dataL[0] + dataL[1] + dataL[2]) / 765;
                let bassR = (dataR[0] + dataR[1] + dataR[2]) / 765;
                
                smoothL += (bassL - smoothL) * 0.15;
                smoothR += (bassR - smoothR) * 0.15;
                smoothC = (smoothL + smoothR) * 0.5;
                hue = (hue + 0.2 + (smoothC * 0.8)) % 360;
            } else {
                smoothL *= 0.9; smoothR *= 0.9; smoothC *= 0.9;
            }

            updateClock();
            
            // Fons negre base
            ctx.globalCompositeOperation = 'source-over';
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, w, h);
            
            // Brillantor d'Ambilight
            ctx.globalCompositeOperation = 'lighter';
            const baseFade = Math.min(w, h) * 0.15;
            
            const drawGlow = (x, y, width, height, hueVal, smoothVal) => {
                const grad = ctx.createLinearGradient(x, y, x + (width === w ? 0 : width), y + (height === h ? 0 : height));
                const alpha = 0.1 + smoothVal * 0.7;
                grad.addColorStop(0, `hsla(${hueVal}, 100%, 50%, ${alpha})`);
                grad.addColorStop(1, 'transparent');
                ctx.fillStyle = grad;
                ctx.fillRect(x, y, width, height);
            };

            drawGlow(0, 0, baseFade + (smoothL * baseFade * 2), h, hue, smoothL); // Esquerra
            drawGlow(w - (baseFade + (smoothR * baseFade * 2)), 0, baseFade + (smoothR * baseFade * 2), h, (hue + 180) % 360, smoothR); // Dreta
            
            const verticalGlow = baseFade + (smoothC * baseFade);
            drawGlow(0, 0, w, verticalGlow, (hue + 90) % 360, smoothC); // Dalt
            drawGlow(0, h - verticalGlow, w, verticalGlow, (hue + 270) % 360, smoothC); // Baix

            clockElement.style.transform = `scale(${1 + (smoothC * 0.1)})`;
        }

        window.onclick = async (e) => {
            if (audioCtx && audioCtx.state === 'suspended') await audioCtx.resume();
            if (!playlistContainer.contains(e.target)) togglePlaylist(playlistContainer.classList.contains('minimized'));
        };

        setInterval(updateClock, 1000);
        updateClock();
        togglePlaylist(true);
    </script>
</body>
</html>
