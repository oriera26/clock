<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ambilight Visualizer - Bold Stereo</title>
    <style>
        :root {
            --bg-color: #000;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            background-color: #000;
        }

        #ui-layer {
            position: relative;
            z-index: 10;
            text-align: center;
            pointer-events: none;
        }

        #clock {
            font-size: clamp(4rem, 15vw, 8rem);
            font-weight: 700; /* Tipografia Bold */
            color: rgba(255, 255, 255, 0.95);
            letter-spacing: -1px;
            font-variant-numeric: tabular-nums;
            text-shadow: 0 0 40px rgba(0, 0, 0, 1);
            will-change: transform;
        }

        #upload-container {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            pointer-events: auto;
            transition: opacity 0.5s ease, visibility 0.5s;
        }

        #upload-container.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .btn {
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.6);
            padding: 12px 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.7rem;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border-color: rgba(255, 255, 255, 0.3);
        }

        input[type="file"] {
            display: none;
        }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <div id="ui-layer">
        <div id="clock">00:00:00</div>
    </div>

    <div id="upload-container">
        <label class="btn">
            Seleccionar Música
            <input type="file" id="audio-input" accept="audio/*">
        </label>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        const clockElement = document.getElementById('clock');
        const audioInput = document.getElementById('audio-input');
        const uploadContainer = document.getElementById('upload-container');
        
        let audioCtx, analyserL, analyserR, dataL, dataR, source;
        let audio = new Audio();
        let smoothL = 0, smoothR = 0, smoothC = 0;
        let hue = 0;
        let w, h;

        function resize() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        function updateClock() {
            const now = new Date();
            clockElement.textContent = 
                `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')}`;
        }

        function initAudio(file) {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const splitter = audioCtx.createChannelSplitter(2);
                analyserL = audioCtx.createAnalyser();
                analyserR = audioCtx.createAnalyser();
                analyserL.fftSize = 128;
                analyserR.fftSize = 128;
                source = audioCtx.createMediaElementSource(audio);
                source.connect(splitter);
                splitter.connect(analyserL, 0);
                splitter.connect(analyserR, 1);
                source.connect(audioCtx.destination);
                dataL = new Uint8Array(analyserL.frequencyBinCount);
                dataR = new Uint8Array(analyserR.frequencyBinCount);
            }
            audio.src = URL.createObjectURL(file);
            
            // Amagar el botó en seleccionar el fitxer
            uploadContainer.classList.add('hidden');
            
            audio.play();
            render();
        }

        function render() {
            requestAnimationFrame(render);
            if (analyserL && analyserR) {
                analyserL.getByteFrequencyData(dataL);
                analyserR.getByteFrequencyData(dataR);
                let bassL = (dataL[0] + dataL[1] + dataL[2]) / 765;
                let bassR = (dataR[0] + dataR[1] + dataR[2]) / 765;
                smoothL += (bassL - smoothL) * 0.15;
                smoothR += (bassR - smoothR) * 0.15;
                smoothC = (smoothL + smoothR) * 0.5;
                hue = (hue + 0.15 + (smoothC * 0.6)) % 360; 
            }
            updateClock();
            ctx.globalCompositeOperation = 'source-over';
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, w, h);
            ctx.globalCompositeOperation = 'lighter';
            const baseFade = Math.min(w, h) * 0.12;
            const sizeL = baseFade + (smoothL * baseFade * 1.5);
            const gradL = ctx.createLinearGradient(0, 0, sizeL, 0);
            gradL.addColorStop(0, `hsla(${hue}, 100%, 40%, ${0.1 + smoothL * 0.5})`);
            gradL.addColorStop(1, 'transparent');
            ctx.fillStyle = gradL;
            ctx.fillRect(0, 0, sizeL, h);
            const sizeR = baseFade + (smoothR * baseFade * 1.5);
            const gradR = ctx.createLinearGradient(w, 0, w - sizeR, 0);
            gradR.addColorStop(0, `hsla(${(hue + 180) % 360}, 100%, 40%, ${0.1 + smoothR * 0.5})`);
            gradR.addColorStop(1, 'transparent');
            ctx.fillStyle = gradR;
            ctx.fillRect(w - sizeR, 0, sizeR, h);
            const sizeT = baseFade + (smoothC * baseFade);
            const gradT = ctx.createLinearGradient(0, 0, 0, sizeT);
            gradT.addColorStop(0, `hsla(${(hue + 90) % 360}, 100%, 40%, ${0.05 + smoothC * 0.4})`);
            gradT.addColorStop(1, 'transparent');
            ctx.fillStyle = gradT;
            ctx.fillRect(0, 0, w, sizeT);
            const sizeB = baseFade + (smoothC * baseFade);
            const gradB = ctx.createLinearGradient(0, h, 0, h - sizeB);
            gradB.addColorStop(0, `hsla(${(hue + 270) % 360}, 100%, 40%, ${0.05 + smoothC * 0.4})`);
            gradB.addColorStop(1, 'transparent');
            ctx.fillStyle = gradB;
            ctx.fillRect(0, h - sizeB, w, sizeB);
            clockElement.style.transform = `scale(${1 + (smoothC * 0.05)})`;
        }
        setInterval(updateClock, 1000);
        updateClock();
        render();

        audioInput.addEventListener('change', function() {
            if (this.files[0]) initAudio(this.files[0]);
        });

        window.addEventListener('click', (e) => {
            if (e.target.tagName !== 'INPUT' && e.target.tagName !== 'LABEL') {
                if (audio.src) {
                    audio.paused ? audio.play() : audio.pause();
                    // Mostrar/Amagar segons l'estat si es fa click fora
                    if (audio.paused) {
                        uploadContainer.classList.remove('hidden');
                        uploadContainer.style.opacity = "1";
                    } else {
                        uploadContainer.classList.add('hidden');
                    }
                }
            }
        });
    </script>
</body>
</html>
